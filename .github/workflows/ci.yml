name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck and build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Run SDK flow example
        run: npm run example:flow

      - name: Run combined local stack example
        run: npm run example:local-stack

      - name: Run Noir-shaped proof example
        run: npm run example:noir

      - name: Run 0G-shaped storage example
        run: npm run example:og

      - name: Run validation example
        run: npm run example:basic

      - name: Run delegation gate example
        run: npm run example:delegation

      - name: Run AXL-shaped message example
        run: npm run example:axl

      - name: Run peer message example
        run: npm run example:peer
